                items: [
                    { id: 'r1', name: 'علبه أرز بالشعريه', price: 75 },
                    { id: 'r2', name: 'علبه رز خلطه', price: 100 },
                    { id: 'r3', name: 'علبه رز خلطه مكسرات وكبده', price: 200 },
                ]
            },
             {
                category: "السلطات",
                icon: "fa-carrot",
                image: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=150&h=150&fit=crop",
                items: [
                    { id: 'sa1', name: 'سلطه خضرا', price: 50 },
                    { id: 'sa2', name: 'سلطه طحينه', price: 75 },
                    { id: 'sa3', name: 'طماطم مخللة', price: 50 },
                    { id: 'sa4', name: 'بتنجان مخلل', price: 50 },
                    { id: 'sa5', name: 'بابا غنوج', price: 75 },
                ]
            }
        ];

        // متغيرات النظام
        let currentCategory = "الكل";
        let cart = [];
        const phone = "201004387435";
        let isDarkMode = false;

        // تهيئة الصفحة
        function init() {
            initTheme();
            renderCategories();
            renderMenu("الكل");
            loadCartFromStorage();
        }

        // عرض الأقسام في الشريط العلوي
        function renderCategories() {
            const container = document.getElementById('categories-container');
            container.innerHTML = `
                <li>
                    <button onclick="filterMenu('الكل')" id="cat-btn-الكل" class="cat-btn bg-primary text-white pl-4 pr-1.5 py-1.5 rounded-full font-bold text-sm shadow-md transition whitespace-nowrap flex items-center gap-2" data-cat="الكل">
                        <div class="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center"><i class="fa-solid fa-list-ul"></i></div>
                        الكل
                    </button>
                </li>
            `;

            menuData.forEach(cat => {
                container.innerHTML += `
                    <li>
                        <button onclick="filterMenu('${cat.category}')" id="cat-btn-${cat.category}" class="cat-btn bg-white dark:bg-darkBg text-gray-600 dark:text-darkBeige border border-gray-200 dark:border-gray-800 hover:border-primary dark:hover:border-primary pl-4 pr-1.5 py-1.5 rounded-full font-bold text-sm transition whitespace-nowrap flex items-center gap-2" data-cat="${cat.category}">
                            <div class="w-8 h-8 rounded-full bg-amber-50 dark:bg-darkCard text-primary flex items-center justify-center border border-amber-100 dark:border-gray-700 shadow-sm transition-colors">
                                <i class="fa-solid ${cat.icon}"></i>
                            </div>
                            ${cat.category}
                        </button>
                    </li>
                `;
            });
        }

        // فلترة وعرض الوجبات
        function filterMenu(category) {
            currentCategory = category;
            
            const searchInput = document.getElementById('search-input');
            if(searchInput && searchInput.value) {
                searchInput.value = '';
            }
            
            document.querySelectorAll('.cat-btn').forEach(btn => {
                if(btn.getAttribute('data-cat') === category) {
                    btn.className = `cat-btn bg-primary text-white pl-4 pr-1.5 py-1.5 rounded-full font-bold text-sm shadow-md transition whitespace-nowrap flex items-center gap-2`;
                } else {
                    btn.className = `cat-btn bg-white dark:bg-darkBg text-gray-600 dark:text-darkBeige border border-gray-200 dark:border-gray-800 hover:border-primary dark:hover:border-primary pl-4 pr-1.5 py-1.5 rounded-full font-bold text-sm transition whitespace-nowrap flex items-center gap-2`;
                }
            });

            renderMenu(category);
        }

        function renderMenu(category) {
            const container = document.getElementById('menu-container');
            container.style.opacity = 0;

            setTimeout(() => {
                let htmlContent = '';
                const catsToRender = category === "الكل" ? menuData : menuData.filter(c => c.category === category);

                catsToRender.forEach(cat => {
                    htmlContent += `
                        <div class="col-span-1 md:col-span-2 lg:col-span-3 flex items-center gap-3 mt-6 mb-2 pb-3 border-b border-gray-200 dark:border-gray-800">
                            <div class="w-12 h-12 rounded-xl bg-amber-100 dark:bg-darkCard text-primary flex items-center justify-center text-2xl shadow-sm border border-amber-200 dark:border-gray-700">
                                <i class="fa-solid ${cat.icon}"></i>
                            </div>
                            <h2 class="text-2xl font-extrabold text-secondary dark:text-beige tracking-wide">${cat.category}</h2>
                        </div>
                    `;

                    cat.items.forEach(item => {
                        const priceDisplay = item.note ? item.note : `${item.price} <span class="text-xs text-gray-500 dark:text-gray-400 font-normal">ج.م</span>`;
                        
                        htmlContent += `
                            <div class="menu-card bg-white dark:bg-darkCard rounded-2xl p-5 border border-gray-100 dark:border-gray-800 flex flex-col justify-between h-full relative overflow-hidden group shadow-sm hover:shadow-md transition-all">
                                <div class="absolute right-0 top-0 bottom-0 w-1 bg-primary transform translate-x-full group-hover:translate-x-0 transition-transform duration-300"></div>
                                
                                <div>
                                    <h3 class="text-lg font-bold text-secondary dark:text-beige mb-1">${item.name}</h3>
                                </div>
                                <div class="mt-4 flex justify-between items-center border-t border-dashed border-gray-200 dark:border-gray-700 pt-4">
                                    <div class="text-xl font-extrabold text-secondary dark:text-beige">${priceDisplay}</div>
                                    <button onclick="addToCart('${item.id}', '${item.name}', ${item.price}, '${item.note || ''}')" class="bg-amber-100 dark:bg-darkBg hover:bg-primary dark:hover:bg-primary text-primary hover:text-white w-10 h-10 rounded-full flex items-center justify-center transition-colors border dark:border-gray-700 dark:hover:border-primary">
                                        <i class="fa-solid fa-plus"></i>
                                    </button>
                                </div>
                            </div>
                        `;
                    });
                });
                
                container.innerHTML = htmlContent;
                container.style.opacity = 1;
            }, 100);
        }

        // دالة البحث الذكي
        function handleSearch(query) {
            const container = document.getElementById('menu-container');
            const lowerQuery = query.toLowerCase().trim();
            
            if (!lowerQuery) {
                renderMenu(currentCategory);
                return;
            }

            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.classList.replace('bg-primary', 'bg-white');
                btn.classList.replace('text-white', 'text-gray-600');
                btn.classList.add('border', 'border-gray-200');
                btn.classList.remove('shadow-md');
            });

            let allItems = [];
            menuData.forEach(cat => {
                const itemsWithCat = cat.items.map(item => ({...item, catName: cat.category}));
                allItems = allItems.concat(itemsWithCat);
            });

            const filteredItems = allItems.filter(item => item.name.toLowerCase().includes(lowerQuery));

            container.style.opacity = 0;
            setTimeout(() => {
                let htmlContent = '';
                
                if (filteredItems.length === 0) {
                    htmlContent = `
                        <div class="col-span-1 md:col-span-2 lg:col-span-3 text-center py-10">
                            <i class="fa-solid fa-magnifying-glass text-4xl text-gray-300 dark:text-gray-700 mb-3 block"></i>
                            <p class="text-gray-500 dark:text-darkBeige font-medium text-lg">عذراً، لم نجد "${query}" في المنيو</p>
                            <button onclick="document.getElementById('search-input').value=''; handleSearch(''); filterMenu('الكل');" class="mt-4 text-primary underline text-sm font-bold">عرض كل المنيو</button>
                        </div>
                    `;
                } else {
                    htmlContent += `
                        <div class="col-span-1 md:col-span-2 lg:col-span-3 mb-2">
                            <h2 class="text-xl font-bold text-secondary dark:text-beige">نتائج البحث عن: <span class="text-primary">${query}</span></h2>
                        </div>
                    `;

                    filteredItems.forEach(item => {
                        const priceDisplay = item.note ? item.note : `${item.price} <span class="text-xs text-gray-500 dark:text-gray-400 font-normal">ج.م</span>`;
                        
                        htmlContent += `
                            <div class="menu-card bg-white dark:bg-darkCard rounded-2xl p-5 border border-gray-100 dark:border-gray-800 flex flex-col justify-between h-full relative overflow-hidden group shadow-sm hover:shadow-md transition-all">
                                <div class="absolute right-0 top-0 bottom-0 w-1 bg-primary transform translate-x-full group-hover:translate-x-0 transition-transform duration-300"></div>
                                
                                <div>
                                    <span class="text-xs font-bold text-primary bg-amber-50 dark:bg-darkBg dark:border dark:border-gray-700 px-2 py-1 rounded-md mb-2 inline-block">${item.catName}</span>
                                    <h3 class="text-lg font-bold text-secondary dark:text-beige mb-1">${item.name}</h3>
                                </div>
                                <div class="mt-4 flex justify-between items-center border-t border-dashed border-gray-200 dark:border-gray-700 pt-4">
                                    <div class="text-xl font-extrabold text-secondary dark:text-beige">${priceDisplay}</div>
                                    <button onclick="addToCart('${item.id}', '${item.name}', ${item.price}, '${item.note || ''}')" class="bg-amber-100 dark:bg-darkBg hover:bg-primary dark:hover:bg-primary text-primary hover:text-white w-10 h-10 rounded-full flex items-center justify-center transition-colors border dark:border-gray-700 dark:hover:border-primary">
                                        <i class="fa-solid fa-plus"></i>
                                    </button>
                                </div>
                            </div>
                        `;
                    });
                }
                container.innerHTML = htmlContent;
                container.style.opacity = 1;
            }, 100);
        }

        // إدارة سلة المشتريات
        function addToCart(id, name, price, note) {
            const existingItem = cart.find(item => item.id === id);
            if(existingItem) {
                existingItem.qty++;
            } else {
                cart.push({ id, name, price, note, qty: 1 });
            }
            
            saveCart();
            updateCartUI();
            showToast(`تمت إضافة ${name} للسلة`);
            
            const badge = document.getElementById('cart-badge');
            badge.classList.add('scale-125');
            setTimeout(() => badge.classList.remove('scale-125'), 200);
        }

        function updateQuantity(id, change) {
            const itemIndex = cart.findIndex(item => item.id === id);
            if(itemIndex > -1) {
                cart[itemIndex].qty += change;
                if(cart[itemIndex].qty <= 0) {
                    cart.splice(itemIndex, 1);
                }
                saveCart();
                updateCartUI();
            }
        }

        function removeItem(id) {
            cart = cart.filter(item => item.id !== id);
            saveCart();
            updateCartUI();
        }

        function saveCart() {
            localStorage.setItem('loqmaCart', JSON.stringify(cart));
        }

        function loadCartFromStorage() {
            const saved = localStorage.getItem('loqmaCart');
            if(saved) {
                cart = JSON.parse(saved);
                updateCartUI();
            }
        }

        function updateCartUI() {
            const itemsContainer = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            const badge = document.getElementById('cart-badge');
            
            const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
            badge.textContent = totalItems;
            if(totalItems > 0) {
                badge.classList.remove('scale-0');
            } else {
                badge.classList.add('scale-0');
            }

            if(cart.length === 0) {
                itemsContainer.innerHTML = `
                    <div class="text-center text-gray-400 dark:text-gray-600 py-10 flex flex-col items-center justify-center h-full">
                        <i class="fa-solid fa-cart-arrow-down text-6xl mb-4 text-gray-200 dark:text-gray-700"></i>
                        <p class="font-medium text-lg">سلتك فارغة يا فندم</p>
                        <p class="text-sm mt-2">اختار أشهى الأكلات من المنيو</p>
                    </div>
                `;
                totalEl.textContent = "0";
                return;
            }

            let total = 0;
            itemsContainer.innerHTML = '';
            
            cart.forEach(item => {
                const itemTotal = item.price * item.qty;
                total += itemTotal;
                
                const priceText = item.note ? `<span class="text-xs text-primary">${item.note}</span>` : `${itemTotal} ج.م`;

                itemsContainer.innerHTML += `
                    <div class="flex justify-between items-center py-4 border-b border-gray-100 dark:border-gray-800 last:border-0">
                        <div class="flex-1">
                            <h4 class="font-bold text-secondary dark:text-beige text-sm md:text-base">${item.name}</h4>
                            <div class="font-bold text-primary mt-1">${priceText}</div>
                        </div>
                        <div class="flex items-center gap-3 ml-4">
                            <div class="flex items-center bg-gray-50 dark:bg-darkBg rounded-lg border border-gray-200 dark:border-gray-700">
                                <button onclick="updateQuantity('${item.id}', 1)" class="w-8 h-8 text-gray-600 dark:text-darkBeige hover:text-primary dark:hover:text-primary transition"><i class="fa-solid fa-plus text-xs"></i></button>
                                <span class="w-6 text-center font-bold text-sm text-secondary dark:text-beige">${item.qty}</span>
                                <button onclick="updateQuantity('${item.id}', -1)" class="w-8 h-8 text-gray-600 dark:text-darkBeige hover:text-red-500 dark:hover:text-red-400 transition"><i class="fa-solid fa-minus text-xs"></i></button>
                            </div>
                            <button onclick="removeItem('${item.id}')" class="text-gray-300 dark:text-gray-600 hover:text-red-500 dark:hover:text-red-500 transition px-2">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
            });

            totalEl.textContent = total;
        }

        function toggleCart() {
            const modal = document.getElementById('cart-modal');
            const modalContent = modal.querySelector('div.absolute');
            
            if(modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                setTimeout(() => {
                    modal.classList.remove('opacity-0');
                    if(window.innerWidth < 768) {
                        modalContent.classList.remove('translate-y-full');
                    } else {
                        modalContent.classList.remove('scale-95', 'opacity-0');
                    }
                }, 10);
            } else {
                modal.classList.add('opacity-0');
                if(window.innerWidth < 768) {
                    modalContent.classList.add('translate-y-full');
                }
                setTimeout(() => {
                    modal.classList.add('hidden');
                }, 300);
            }
        }

        function checkoutWhatsApp() {
            if(cart.length === 0) {
                alert("السلة فارغة!");
                return;
            }

            const customerName = document.getElementById('customer-name').value.trim();
            const customerAddress = document.getElementById('customer-address').value.trim();

            if(!customerName || !customerAddress) {
                alert("برجاء إدخال الاسم والعنوان بالكامل لتأكيد الطلب!");
                if(!customerName) document.getElementById('customer-name').focus();
                else document.getElementById('customer-address').focus();
                return;
            }

            let message = "✨ *طلب جديد من منيو لقمة هنية* ✨\n\n";
            message += `👤 *الاسم:* ${customerName}\n`;
            message += `📍 *العنوان:* ${customerAddress}\n`;
            message += `───────────────\n\n`;

            let total = 0;
            let hasCustomPrice = false;

            cart.forEach(item => {
                const itemTotal = item.price * item.qty;
                total += itemTotal;
                
                if(item.note) hasCustomPrice = true;
                
                let priceStr = item.note ? `(${item.note})` : `${itemTotal} ج.م`;
                message += `▪️ ${item.name} \n   الكمية: ${item.qty} ✖️ ${priceStr}\n\n`;
            });

            message += `\n───────────────\n`;
            if(total > 0) {
                message += `💰 *الإجمالي المبدئي:* ${total} ج.م\n`;
            }
            if(hasCustomPrice) {
                message += `📌 *(ملاحظة: الإجمالي لا يشمل الأصناف التي تحسب بالوزن وسيتم تحديدها من قبل المطعم)*\n`;
            }
            message += `\nأتمنى تأكيد الطلب والميعاد، شكراً! 🤍`;

            const encodedMessage = encodeURIComponent(message);
            const whatsappUrl = `https://wa.me/${phone}?text=${encodedMessage}`;
            
            window.open(whatsappUrl, '_blank');
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').textContent = msg;
            
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // إدارة الوضع الليلي
        function initTheme() {
            if (localStorage.getItem('theme') === 'dark') {
                isDarkMode = true;
                document.documentElement.classList.add('dark');
                document.getElementById('theme-icon').classList.replace('fa-moon', 'fa-sun');
            }
        }

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            const icon = document.getElementById('theme-icon');
            
            // إعادة تشغيل الأنيميشن في كل ضغطة
            icon.classList.remove('theme-pop');
            void icon.offsetWidth; // Trigger reflow
            icon.classList.add('theme-pop');
            
            if (isDarkMode) {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                icon.classList.replace('fa-moon', 'fa-sun');
                icon.classList.replace('text-primary', 'text-amber-500');
            } else {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                icon.classList.replace('fa-sun', 'fa-moon');
                icon.classList.replace('text-amber-500', 'text-primary');
            }
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
